<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipChat</title>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #0077ff;
    --green: #00ff88;
    --red: #ff4466;
    --text: #c8d8e8;
    --muted: #4a6080;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: var(–sans);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
background-image:
radial-gradient(ellipse at 20% 20%, rgba(0,100,255,0.07) 0%, transparent 60%),
radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.05) 0%, transparent 60%);
}

/* ── AUTH SCREEN ── */
#auth-screen {
width: 100%;
max-width: 380px;
padding: 16px;
}

.logo {
text-align: center;
margin-bottom: 32px;
}

.logo-icon {
font-size: 40px;
display: block;
margin-bottom: 8px;
}

.logo h1 {
font-family: var(–mono);
font-size: 28px;
color: var(–accent);
letter-spacing: 4px;
text-transform: uppercase;
}

.logo p {
font-size: 12px;
color: var(–muted);
letter-spacing: 2px;
margin-top: 4px;
font-family: var(–mono);
}

.card {
background: var(–panel);
border: 1px solid var(–border);
border-radius: 12px;
padding: 28px 24px;
position: relative;
overflow: hidden;
}

.card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
}

.tab-row {
display: flex;
gap: 8px;
margin-bottom: 24px;
}

.tab-btn {
flex: 1;
padding: 10px;
background: transparent;
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: var(–mono);
font-size: 13px;
cursor: pointer;
letter-spacing: 1px;
transition: all 0.2s;
}

.tab-btn.active {
background: rgba(0,212,255,0.1);
border-color: var(–accent);
color: var(–accent);
}

.field {
margin-bottom: 16px;
}

.field label {
display: block;
font-family: var(–mono);
font-size: 11px;
color: var(–muted);
letter-spacing: 2px;
margin-bottom: 6px;
text-transform: uppercase;
}

.field input {
width: 100%;
padding: 12px 14px;
background: rgba(0,0,0,0.4);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–text);
font-family: var(–mono);
font-size: 14px;
outline: none;
transition: border-color 0.2s;
}

.field input:focus {
border-color: var(–accent);
}

.btn-primary {
width: 100%;
padding: 14px;
background: linear-gradient(135deg, var(–accent2), var(–accent));
border: none;
border-radius: 8px;
color: #000;
font-family: var(–mono);
font-size: 14px;
font-weight: bold;
letter-spacing: 2px;
cursor: pointer;
margin-top: 8px;
transition: opacity 0.2s, transform 0.1s;
}

.btn-primary:active { transform: scale(0.98); opacity: 0.9; }

.auth-msg {
text-align: center;
font-family: var(–mono);
font-size: 12px;
margin-top: 12px;
min-height: 18px;
}

.auth-msg.error { color: var(–red); }
.auth-msg.success { color: var(–green); }

/* ── CHAT SCREEN ── */
#chat-screen {
display: none;
width: 100%;
max-width: 480px;
height: 100vh;
max-height: 100vh;
flex-direction: column;
padding: 0;
}

.chat-header {
background: var(–panel);
border-bottom: 1px solid var(–border);
padding: 14px 16px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
position: relative;
}

.chat-header::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
}

.chat-title {
display: flex;
align-items: center;
gap: 10px;
}

.status-dot {
width: 8px; height: 8px;
background: var(–green);
border-radius: 50%;
box-shadow: 0 0 6px var(–green);
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

.chat-title h2 {
font-family: var(–mono);
font-size: 16px;
color: var(–accent);
letter-spacing: 2px;
}

.user-badge {
font-family: var(–mono);
font-size: 11px;
color: var(–muted);
letter-spacing: 1px;
}

.user-badge span {
color: var(–green);
}

.logout-btn {
background: transparent;
border: 1px solid var(–border);
border-radius: 6px;
color: var(–muted);
font-family: var(–mono);
font-size: 11px;
padding: 6px 10px;
cursor: pointer;
letter-spacing: 1px;
transition: all 0.2s;
}

.logout-btn:hover {
border-color: var(–red);
color: var(–red);
}

.messages-wrap {
flex: 1;
overflow-y: auto;
padding: 16px;
display: flex;
flex-direction: column;
gap: 12px;
scroll-behavior: smooth;
}

.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-track { background: transparent; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

.msg-item {
display: flex;
flex-direction: column;
max-width: 80%;
animation: fadeUp 0.25s ease;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.msg-item.mine {
align-self: flex-end;
align-items: flex-end;
}

.msg-item.theirs {
align-self: flex-start;
align-items: flex-start;
}

.msg-sender {
font-family: var(–mono);
font-size: 10px;
color: var(–muted);
letter-spacing: 1px;
margin-bottom: 4px;
text-transform: uppercase;
}

.msg-item.mine .msg-sender { color: var(–accent); }

.msg-bubble {
padding: 10px 14px;
border-radius: 12px;
font-size: 14px;
line-height: 1.5;
word-break: break-word;
}

.msg-item.mine .msg-bubble {
background: linear-gradient(135deg, var(–accent2), #0055cc);
color: #fff;
border-bottom-right-radius: 4px;
}

.msg-item.theirs .msg-bubble {
background: var(–panel);
border: 1px solid var(–border);
color: var(–text);
border-bottom-left-radius: 4px;
}

.msg-time {
font-family: var(–mono);
font-size: 10px;
color: var(–muted);
margin-top: 4px;
}

.empty-state {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
color: var(–muted);
font-family: var(–mono);
font-size: 12px;
letter-spacing: 1px;
gap: 8px;
}

.empty-state .icon { font-size: 32px; opacity: 0.3; }

/* ── INPUT BAR ── */
.input-bar {
background: var(–panel);
border-top: 1px solid var(–border);
padding: 12px 16px;
display: flex;
gap: 10px;
align-items: center;
flex-shrink: 0;
}

.msg-input {
flex: 1;
padding: 12px 14px;
background: rgba(0,0,0,0.4);
border: 1px solid var(–border);
border-radius: 24px;
color: var(–text);
font-family: var(–sans);
font-size: 14px;
outline: none;
transition: border-color 0.2s;
}

.msg-input:focus { border-color: var(–accent); }

.send-btn {
width: 44px; height: 44px;
background: linear-gradient(135deg, var(–accent2), var(–accent));
border: none;
border-radius: 50%;
color: #000;
font-size: 18px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: transform 0.1s, opacity 0.2s;
}

.send-btn:active { transform: scale(0.9); opacity: 0.8; }

.hidden { display: none !important; }
</style>

</head>

  </div>
</div>

<!-- CHAT SCREEN -->

<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-title">
      <div class="status-dot"></div>
      <h2>SHIPCHAT</h2>
    </div>
    <div class="user-badge">LOGGED IN AS <span id="current-user-label"></span></div>
    <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
  </div>

  <div class="messages-wrap" id="messages-wrap">
    <div class="empty-state" id="empty-state">
      <span class="icon">📡</span>
      <span>No messages yet. Say something!</span>
    </div>
  </div>

  <div class="input-bar">
    <input class="msg-input" id="msg-input" type="text" placeholder="Type a message..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ── GUN SETUP ──
  const gun = Gun({ localStorage: true });
  const messages = gun.get('shipchat-messages');
  const users = gun.get('shipchat-users');

  let currentUser = null;
  let renderedKeys = new Set();

  // ── AUTH TABS ──
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
    setMsg('', '');
  }

  function setMsg(text, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.className = 'auth-msg ' + (type || '');
  }

  // ── REGISTER ──
  function doRegister() {
    const u = document.getElementById('reg-user').value.trim();
    const p = document.getElementById('reg-pass').value;
    const p2 = document.getElementById('reg-pass2').value;

    if (!u || !p) return setMsg('Fill in all fields.', 'error');
    if (u.length < 3) return setMsg('Username too short (min 3).', 'error');
    if (p.length < 4) return setMsg('Password too short (min 4).', 'error');
    if (p !== p2) return setMsg('Passwords do not match.', 'error');

    users.get(u).once(data => {
      if (data && data.password) {
        setMsg('Username already taken.', 'error');
      } else {
        users.get(u).put({ username: u, password: p });
        setMsg('Account created! You can now login.', 'success');
        setTimeout(() => switchTab('login'), 1200);
      }
    });
  }

  // ── LOGIN ──
  function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;

    if (!u || !p) return setMsg('Fill in all fields.', 'error');

    users.get(u).once(data => {
      if (!data || !data.password) {
        setMsg('User not found. Please register.', 'error');
      } else if (data.password !== p) {
        setMsg('Wrong password.', 'error');
      } else {
        currentUser = u;
        enterChat();
      }
    });
  }

  // ── LOGOUT ──
  function doLogout() {
    currentUser = null;
    renderedKeys.clear();
    document.getElementById('messages-wrap').innerHTML = `
      <div class="empty-state" id="empty-state">
        <span class="icon">📡</span>
        <span>No messages yet. Say something!</span>
      </div>`;
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('auth-screen').style.flexDirection = 'column';
    document.getElementById('auth-screen').style.alignItems = 'center';
    document.getElementById('auth-screen').style.justifyContent = 'center';
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    setMsg('', '');
  }

  // ── ENTER CHAT ──
  function enterChat() {
    document.getElementById('auth-screen').style.display = 'none';
    const cs = document.getElementById('chat-screen');
    cs.style.display = 'flex';
    document.getElementById('current-user-label').textContent = currentUser.toUpperCase();
    listenMessages();
    document.getElementById('msg-input').focus();
  }

  // ── SEND MESSAGE ──
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentUser) return;

    const key = Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    messages.get(key).put({
      user: currentUser,
      text: text,
      time: Date.now()
    });

    input.value = '';
    input.focus();
  }

  // ── LISTEN MESSAGES ──
  function listenMessages() {
    messages.map().on((data, key) => {
      if (!data || !data.text || renderedKeys.has(key)) return;
      renderedKeys.add(key);

      const empty = document.getElementById('empty-state');
      if (empty) empty.remove();

      const wrap = document.getElementById('messages-wrap');
      const isMine = data.user === currentUser;

      const time = new Date(data.time);
      const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const div = document.createElement('div');
      div.className = 'msg-item ' + (isMine ? 'mine' : 'theirs');
      div.dataset.time = data.time;
      div.innerHTML = `
        <div class="msg-sender">${escHtml(data.user)}</div>
        <div class="msg-bubble">${escHtml(data.text)}</div>
        <div class="msg-time">${timeStr}</div>
      `;

      // Insert in time order
      const items = wrap.querySelectorAll('.msg-item');
      let inserted = false;
      for (let item of items) {
        if (Number(item.dataset.time) > data.time) {
          wrap.insertBefore(div, item);
          inserted = true;
          break;
        }
      }
      if (!inserted) wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    });
  }

  // ── SEND ON ENTER ──
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  // ── HELPERS ──
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── AUTO LOGIN CHECK ──
  // (Optional: persist session across refresh via sessionStorage)
  const saved = sessionStorage.getItem('shipchat_user');
  if (saved) {
    currentUser = saved;
    enterChat();
  }

  // Save session on login
  const _enterChat = enterChat;
  window.enterChat = function() {
    sessionStorage.setItem('shipchat_user', currentUser);
    _enterChat();
  };
</script>

</body>
</html>
